# Déploie automatiquement Penguin World sur GitHub Pages à chaque push sur main.
# Le site final : https://karlphdev.github.io/learning-to-code-/
name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}        # permet aussi de lancer le déploiement à la main

# Droits nécessaires pour publier sur Pages via le token du workflow.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on annule les anciens en cours.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      # `enablement: true` active GitHub Pages automatiquement au premier passage,
      # sans avoir à toucher aux réglages du dépôt.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
